<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Subscribe — HayBackup</title>
<style>
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{ font-family:-apple-system,"Segoe UI",Roboto,system-ui,sans-serif; color:#e5edf7; background:#070b16; line-height:1.6; min-height:100vh; }
  .bg{ position:fixed; inset:0; z-index:-1; background:radial-gradient(900px 700px at 20% 8%,rgba(34,211,238,.18),transparent 60%),radial-gradient(900px 700px at 85% 92%,rgba(59,130,246,.20),transparent 60%),linear-gradient(160deg,#070b16,#0a1426 55%,#06121c); }
  a{ color:#7dd3fc; text-decoration:none; }
  .wrap{ max-width:560px; margin:0 auto; padding:1.4rem 1.2rem 4rem; }
  .top{ display:flex; align-items:center; justify-content:space-between; padding:.6rem 0 1.5rem; }
  .logo{ font-weight:800; font-size:1.15rem; } .logo span{ color:#22d3ee; }
  .card{ background:rgba(15,23,42,.6); border:1px solid rgba(148,163,184,.18); border-radius:18px; padding:2rem; backdrop-filter:blur(14px); box-shadow:0 30px 70px rgba(0,0,0,.5); }
  h1{ font-size:1.6rem; margin-bottom:.3rem; }
  .sub{ color:#9fb0c7; margin-bottom:1.4rem; }
  .plan-box{ display:flex; align-items:center; justify-content:space-between; background:rgba(34,211,238,.1); border:1px solid rgba(34,211,238,.3); border-radius:12px; padding:.9rem 1.1rem; margin-bottom:1.4rem; }
  .plan-box .p{ font-weight:800; font-size:1.3rem; } .plan-box .p span{ font-size:.9rem; color:#9fb0c7; font-weight:600; }
  label{ display:block; font-weight:600; font-size:.85rem; margin:.8rem 0 .3rem; color:#cbd5e1; }
  input,textarea{ width:100%; padding:.7rem .8rem; border-radius:10px; border:1px solid rgba(148,163,184,.25); background:rgba(2,6,23,.55); color:#e6eefb; font:inherit; outline:none; }
  input:focus,textarea:focus{ border-color:#38bdf8; box-shadow:0 0 0 3px rgba(56,189,248,.18); }
  button{ margin-top:1.3rem; width:100%; border:0; border-radius:11px; padding:.85rem; font-weight:700; font-size:1rem; color:#04121f; background:linear-gradient(90deg,#22d3ee,#3b82f6); cursor:pointer; box-shadow:0 10px 26px rgba(34,211,238,.38); }
  button:hover{ transform:translateY(-2px); } button:disabled{ opacity:.6; cursor:default; transform:none; }
  .note{ color:#7e8ca3; font-size:.78rem; margin-top:1rem; text-align:center; }
  .msg{ margin-top:1rem; padding:.7rem .9rem; border-radius:10px; font-size:.9rem; text-align:center; }
  .ok{ background:rgba(34,197,94,.15); border:1px solid rgba(34,197,94,.4); color:#bbf7d0; }
  .err{ background:rgba(239,68,68,.15); border:1px solid rgba(239,68,68,.4); color:#fecaca; }
</style>
</head>
<body>
<div class="bg"></div>
<div class="wrap">
  <div class="top"><div class="logo">🗄️ Hay<span>Backup</span></div><a href="/">← Back to site</a></div>
  <div class="card">
    <h1>Start your subscription</h1>
    <p class="sub">Tell us where to send your subscription details and we'll get you set up.</p>
    <div class="plan-box"><div id="cPlan">HayBackup — Pro</div><div class="p"><span id="cPrice">$19</span><span id="cPer">/mo</span></div></div>
    <form id="f" onsubmit="return submitForm(event)">
      <label for="name">Name</label>
      <input id="name" name="name" autocomplete="name" placeholder="Your name">
      <label for="email">Email *</label>
      <input id="email" name="email" type="email" required autocomplete="email" placeholder="you@company.com">
      <label for="note">Anything we should know? (optional)</label>
      <textarea id="note" name="note" rows="3" placeholder="How many machines, questions, etc."></textarea>
      <button id="btn" type="submit">Continue →</button>
    </form>
    <div id="msg"></div>
    <div class="note">🔒 This is a dev checkout — payment isn't wired up yet, so this just records your interest. A real card checkout will replace it.</div>
  </div>
</div>
<script>
var PLAN_LABEL='Pro';
fetch('/api/pricing').then(function(r){return r.json();}).then(function(d){ var p=d.pricing; if(!p) return;
  document.getElementById('cPlan').textContent=p.plan;
  document.getElementById('cPrice').textContent=(p.currency||'$')+p.price;
  document.getElementById('cPer').textContent='/'+(p.period||'mo');
  PLAN_LABEL=p.plan+' — '+(p.currency||'$')+p.price+'/'+(p.period||'mo');
}).catch(function(){});
function submitForm(e){
  e.preventDefault();
  var btn=document.getElementById('btn'), msg=document.getElementById('msg');
  var email=document.getElementById('email').value.trim(), name=document.getElementById('name').value.trim(), note=document.getElementById('note').value.trim();
  if(!email){ msg.className='msg err'; msg.textContent='Please enter your email.'; return false; }
  btn.disabled=true; btn.textContent='Continuing…'; msg.className=''; msg.textContent='';
  // Try Stripe Checkout first; if payments aren't connected yet, fall back to recording interest.
  fetch('/api/checkout/session',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:email})})
    .then(function(r){return r.json();})
    .then(function(d){
      if(d.ok && d.url){ window.location.href=d.url; return; }   // -> Stripe hosted checkout
      return fetch('/api/checkout',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:name,email:email,note:note,plan:PLAN_LABEL})})
        .then(function(r){return r.json();})
        .then(function(d2){ if(d2.ok){ window.location.href='/success.html'; } else { msg.className='msg err'; msg.textContent=d2.error||'Something went wrong.'; btn.disabled=false; btn.textContent='Continue →'; } });
    })
    .catch(function(){ msg.className='msg err'; msg.textContent='Network error — please try again.'; btn.disabled=false; btn.textContent='Continue →'; });
  return false;
}
</script>
</body>
</html>
