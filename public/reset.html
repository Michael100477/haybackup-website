<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Reset password — HayBackup</title>
<style>
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{ font-family:-apple-system,"Segoe UI",Roboto,system-ui,sans-serif; color:#e5edf7; background:#070b16; min-height:100vh; }
  .bg{ position:fixed; inset:0; z-index:-1; background:radial-gradient(900px 700px at 20% 8%,rgba(34,211,238,.18),transparent 60%),linear-gradient(160deg,#070b16,#0a1426 55%,#06121c); }
  a{ color:#7dd3fc; text-decoration:none; }
  .wrap{ max-width:460px; margin:0 auto; padding:1.4rem 1.2rem 4rem; }
  .top{ display:flex; align-items:center; justify-content:space-between; padding:.6rem 0 1.5rem; }
  .logo{ font-weight:800; font-size:1.15rem; } .logo span{ color:#22d3ee; }
  .card{ background:rgba(15,23,42,.6); border:1px solid rgba(148,163,184,.18); border-radius:18px; padding:2rem; backdrop-filter:blur(14px); box-shadow:0 30px 70px rgba(0,0,0,.5); }
  h1{ font-size:1.5rem; margin-bottom:.3rem; } .sub{ color:#9fb0c7; margin-bottom:1.3rem; font-size:.92rem; }
  label{ display:block; font-weight:600; font-size:.82rem; margin:.8rem 0 .3rem; color:#cbd5e1; }
  input{ width:100%; padding:.7rem .8rem; border-radius:10px; border:1px solid rgba(148,163,184,.25); background:rgba(2,6,23,.55); color:#e6eefb; font:inherit; outline:none; }
  input:focus{ border-color:#38bdf8; box-shadow:0 0 0 3px rgba(56,189,248,.18); }
  button{ margin-top:1.3rem; width:100%; border:0; border-radius:11px; padding:.85rem; font-weight:700; font-size:1rem; color:#04121f; background:linear-gradient(90deg,#22d3ee,#3b82f6); cursor:pointer; }
  .msg{ margin-top:1rem; padding:.7rem .9rem; border-radius:10px; font-size:.9rem; }
  .ok{ background:rgba(34,197,94,.15); border:1px solid rgba(34,197,94,.4); color:#bbf7d0; }
  .err{ background:rgba(239,68,68,.15); border:1px solid rgba(239,68,68,.4); color:#fecaca; }
</style>
</head>
<body>
<div class="bg"></div>
<div class="wrap">
  <div class="top"><div class="logo">🗄️ Hay<span>Backup</span></div><a href="/account.html">Sign in</a></div>
  <div class="card" id="card"><div class="sub">Loading…</div></div>
</div>
<script>
  var card=document.getElementById('card');
  var token=new URLSearchParams(location.search).get('token')||'';
  function val(id){ var e=document.getElementById(id); return e?e.value:''; }
  if(!token){
    card.innerHTML='<h1>Invalid link</h1><p class="sub">This password reset link is missing its token. Please request a new one from the <a href="/account.html">sign-in page</a>.</p>';
  } else {
    card.innerHTML='<h1>Choose a new password</h1><p class="sub">Enter a new password for your HayBackup account.</p>'
      +'<label>New password <span style="color:#7e8ca3;font-weight:400">(min 8 characters)</span></label><input id="pw" type="password" autocomplete="new-password" autofocus>'
      +'<label>Confirm new password</label><input id="pw2" type="password" autocomplete="new-password" onkeydown="if(event.key===\'Enter\')doReset()">'
      +'<button onclick="doReset()">Set new password</button><div id="m"></div>';
  }
  function msg(cls,t){ var m=document.getElementById('m'); if(m){ m.className='msg '+cls; m.textContent=t; } }
  window.doReset=function(){
    var pw=val('pw'), pw2=val('pw2');
    if(pw.length<8){ msg('err','Password must be at least 8 characters.'); return; }
    if(pw!==pw2){ msg('err','Passwords do not match.'); return; }
    fetch('/api/account/reset',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token:token,password:pw})})
      .then(function(r){return r.json();}).then(function(d){
        if(d.ok){ card.innerHTML='<h1>Password updated ✅</h1><p class="sub">Your password has been reset. You can now <a href="/account.html">sign in</a> with your new password.</p>'; }
        else { msg('err',d.error||'Could not reset password.'); }
      }).catch(function(){ msg('err','Network error — try again.'); });
  };
</script>
</body>
</html>
