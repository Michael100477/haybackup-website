<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Thank you — HayBackup</title>
<style>
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{ font-family:-apple-system,"Segoe UI",Roboto,system-ui,sans-serif; color:#e5edf7; background:#070b16; min-height:100vh; display:flex; align-items:center; justify-content:center; text-align:center; }
  .bg{ position:fixed; inset:0; z-index:-1; background:radial-gradient(900px 700px at 50% 20%,rgba(34,211,238,.2),transparent 60%),linear-gradient(160deg,#070b16,#0a1426 55%,#06121c); }
  .card{ max-width:480px; padding:2.4rem; }
  .check{ font-size:3.4rem; }
  h1{ font-size:1.8rem; margin:.6rem 0; }
  p{ color:#9fb0c7; margin-bottom:1.6rem; }
  a{ display:inline-block; font-weight:700; border-radius:11px; padding:.8rem 1.5rem; color:#04121f; background:linear-gradient(90deg,#22d3ee,#3b82f6); text-decoration:none; }
</style>
</head>
<body>
<div class="bg"></div>
<div class="card">
  <div class="check">✅</div>
  <h1>Thanks — you're on the list!</h1>
  <p>We've recorded your interest and we'll be in touch with your subscription details shortly. In the meantime, you can install HayBackup and start your 7-day grace period right away.</p>
  <a href="/">← Back to HayBackup</a>
</div>
</body>
</html>
