<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin — HayBackup</title>
<style>
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{ font-family:-apple-system,"Segoe UI",Roboto,system-ui,sans-serif; color:#e5edf7; background:#070b16; min-height:100vh; }
  .bg{ position:fixed; inset:0; z-index:-1; background:radial-gradient(900px 700px at 20% 8%,rgba(34,211,238,.16),transparent 60%),radial-gradient(900px 700px at 85% 92%,rgba(59,130,246,.18),transparent 60%),linear-gradient(160deg,#070b16,#0a1426 55%,#06121c); }
  a{ color:#7dd3fc; text-decoration:none; }
  .wrap{ max-width:640px; margin:0 auto; padding:1.4rem 1.2rem 4rem; }
  .top{ display:flex; align-items:center; justify-content:space-between; padding:.6rem 0 1.4rem; }
  .logo{ font-weight:800; font-size:1.15rem; } .logo span{ color:#22d3ee; }
  .card{ background:rgba(15,23,42,.6); border:1px solid rgba(148,163,184,.18); border-radius:18px; padding:2rem; backdrop-filter:blur(14px); box-shadow:0 30px 70px rgba(0,0,0,.5); }
  h1{ font-size:1.5rem; margin-bottom:.3rem; } .sub{ color:#9fb0c7; margin-bottom:1.3rem; font-size:.92rem; }
  label{ display:block; font-weight:600; font-size:.82rem; margin:.85rem 0 .3rem; color:#cbd5e1; }
  input,textarea{ width:100%; padding:.7rem .8rem; border-radius:10px; border:1px solid rgba(148,163,184,.25); background:rgba(2,6,23,.55); color:#e6eefb; font:inherit; outline:none; }
  input:focus,textarea:focus{ border-color:#38bdf8; box-shadow:0 0 0 3px rgba(56,189,248,.18); }
  .row{ display:flex; gap:.6rem; } .row>div{ flex:1; }
  button{ margin-top:1.3rem; border:0; border-radius:11px; padding:.8rem 1.4rem; font-weight:700; font-size:1rem; color:#04121f; background:linear-gradient(90deg,#22d3ee,#3b82f6); cursor:pointer; }
  button.ghost{ background:rgba(255,255,255,.1); color:#fff; }
  button:disabled{ opacity:.6; cursor:default; }
  .msg{ margin-top:1rem; padding:.7rem .9rem; border-radius:10px; font-size:.9rem; }
  .ok{ background:rgba(34,197,94,.15); border:1px solid rgba(34,197,94,.4); color:#bbf7d0; }
  .err{ background:rgba(239,68,68,.15); border:1px solid rgba(239,68,68,.4); color:#fecaca; }
  .preview{ background:rgba(34,211,238,.08); border:1px solid rgba(34,211,238,.25); border-radius:12px; padding:1rem 1.2rem; margin-top:1rem; }
  .preview .pp{ font-size:2rem; font-weight:850; } .preview .pp small{ font-size:1rem; color:#9fb0c7; font-weight:600; }
  .hint{ color:#7e8ca3; font-size:.78rem; margin-top:.2rem; }
</style>
</head>
<body>
<div class="bg"></div>
<div class="wrap">
  <div class="top"><div class="logo">🗄️ Hay<span>Backup</span> · Admin</div><a href="/" target="_blank">View site ↗</a></div>
  <div class="card" id="card"><div class="sub">Loading…</div></div>
</div>
<script>
  var card=document.getElementById('card');
  function api(path, method, body){ return fetch(path,{method:method||'GET',headers:{'Content-Type':'application/json'},body:body?JSON.stringify(body):undefined}).then(function(r){return r.json().then(function(j){return{status:r.status,j:j};});}); }
  function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[c];}); }

  function load(){ api('/api/admin/state').then(function(r){ var s=r.j; if(s.needsSetup) return renderSetup(); if(!s.authed) return renderLogin(); renderEditor(); }); }

  function renderSetup(){
    card.innerHTML='<h1>Create your admin password</h1><p class="sub">This protects the pricing editor. Choose a strong password (min 8 characters).</p>'
      +'<label>Password</label><input id="pw" type="password" autofocus>'
      +'<label>Confirm password</label><input id="pw2" type="password">'
      +'<button id="b" onclick="doSetup()">Create &amp; sign in</button><div id="m"></div>';
  }
  window.doSetup=function(){ var pw=document.getElementById('pw').value, pw2=document.getElementById('pw2').value, m=document.getElementById('m');
    if(pw.length<8){ m.className='msg err'; m.textContent='Password must be at least 8 characters.'; return; }
    if(pw!==pw2){ m.className='msg err'; m.textContent='Passwords do not match.'; return; }
    api('/api/admin/setup','POST',{password:pw}).then(function(r){ if(r.j.ok) renderEditor(); else { m.className='msg err'; m.textContent=r.j.error||'Failed.'; } });
  };

  function renderLogin(){
    card.innerHTML='<h1>Admin sign in</h1><p class="sub">Enter your admin password to edit pricing.</p>'
      +'<label>Password</label><input id="pw" type="password" autofocus onkeydown="if(event.key===\'Enter\')doLogin()">'
      +'<button id="b" onclick="doLogin()">Sign in</button><div id="m"></div>';
  }
  window.doLogin=function(){ var pw=document.getElementById('pw').value, m=document.getElementById('m');
    api('/api/admin/login','POST',{password:pw}).then(function(r){ if(r.j.ok) renderEditor(); else { m.className='msg err'; m.textContent=r.j.error||'Incorrect password.'; } });
  };

  var CFG=null;
  function renderEditor(){
    api('/api/admin/tiers').then(function(r){
      if(r.status===401) return renderLogin();
      CFG=r.j||{}; if(!Array.isArray(CFG.tiers)) CFG.tiers=[];
      card.innerHTML='<div style="display:flex;justify-content:space-between;align-items:center"><h1>Plans &amp; pricing</h1><button class="ghost" style="margin:0" onclick="doLogout()">Sign out</button></div>'
        +'<p class="sub">Add, edit, price, and enable/disable plans — no code needed. Changing a price auto-creates a new Stripe price. Leave a single plan enabled to show a one-plan page.</p>'
        +'<div class="row"><div><label>Currency</label><input id="tCur" value="'+esc(CFG.currency||"$")+'"></div>'
        +'<div style="flex:2"><label>Checkout button text</label><input id="tCta" value="'+esc(CFG.cta||"")+'"></div></div>'
        +'<label>Fine print</label><input id="tFine" value="'+esc(CFG.fineprint||"")+'">'
        +'<div id="plansWrap"></div>'
        +'<button class="ghost" onclick="bmAddTier()">+ Add plan</button> <button onclick="bmSaveTiers()">Save plans</button> <a href="/" target="_blank" style="margin-left:.4rem">Preview site ↗</a><div id="tMsg"></div>'
        +'<hr style="margin:1.6rem 0;border:none;border-top:1px solid rgba(148,163,184,.18)">'
        +'<h1 style="font-size:1.2rem">Software updates</h1>'
        +'<p class="sub">Publish a new installer here. Every HayBackup install checks this, notifies the user, and can update itself.</p>'
        +'<div id="relCurrent" class="hint" style="margin-bottom:.6rem">Loading current release…</div>'
        +'<label>Installer file (HayBackup-Setup.exe)</label><input id="relFile" type="file" accept=".exe">'
        +'<label>Version</label><input id="relVer" placeholder="e.g. 1.1.4">'
        +'<label>Release notes (optional)</label><textarea id="relNotes" rows="2" placeholder="What changed in this version"></textarea>'
        +'<button onclick="bmPublish()">Publish update</button><div id="relMsg"></div>'
        +'<hr style="margin:1.6rem 0;border:none;border-top:1px solid rgba(148,163,184,.18)">'
        +'<h1 style="font-size:1.2rem">Payments (Stripe)</h1>'
        +'<p class="sub">Connect Stripe so people can subscribe. Use a <strong>recurring Price ID</strong> from your Stripe product, your <strong>secret key</strong>, and (after deploy) a <strong>webhook signing secret</strong>.</p>'
        +'<div id="stripeState" class="hint" style="margin-bottom:.6rem">Loading…</div>'
        +'<label>Stripe secret key</label><input id="stSecret" type="password" placeholder="sk_live_… or sk_test_…">'
        +'<label>Price ID (recurring)</label><input id="stPrice" placeholder="price_…">'
        +'<label>Webhook signing secret</label><input id="stWebhook" type="password" placeholder="whsec_…">'
        +'<p class="hint">Webhook endpoint (add this in Stripe → Developers → Webhooks): <code id="stHook"></code> &middot; event <code>checkout.session.completed</code></p>'
        +'<button onclick="bmSaveStripe()">Save Stripe settings</button><div id="stMsg"></div>'
        +'<hr style="margin:1.6rem 0;border:none;border-top:1px solid rgba(148,163,184,.18)">'
        +'<h1 style="font-size:1.2rem">Discounts &amp; promo codes</h1>'
        +'<p class="sub">Create a code customers type at checkout (e.g. a launch promo). Powered by Stripe.</p>'
        +'<label>Code</label><input id="pmCode" placeholder="LAUNCH20" style="text-transform:uppercase">'
        +'<div class="row"><div><label>Type</label><select id="pmKind" style="width:100%;padding:.6rem;border-radius:10px;background:rgba(2,6,23,.55);color:#e6eefb;border:1px solid rgba(148,163,184,.25)"><option value="percent">% off</option><option value="amount">$ off</option></select></div>'
        +'<div><label>Amount</label><input id="pmValue" type="number" step="0.01" placeholder="20"></div>'
        +'<div><label>Applies</label><select id="pmDur" style="width:100%;padding:.6rem;border-radius:10px;background:rgba(2,6,23,.55);color:#e6eefb;border:1px solid rgba(148,163,184,.25)"><option value="once">Once</option><option value="forever">Forever</option><option value="repeating">First N months</option></select></div></div>'
        +'<div class="row"><div><label>Months <span class="hint">(if "first N")</span></label><input id="pmMonths" type="number" placeholder="3"></div>'
        +'<div><label>Max redemptions <span class="hint">(optional)</span></label><input id="pmMax" type="number" placeholder="unlimited"></div></div>'
        +'<button onclick="bmCreatePromo()">Create promo code</button><div id="pmMsg"></div>'
        +'<div id="promoList" class="hint" style="margin-top:.9rem">Loading…</div>'
        +'<hr style="margin:1.6rem 0;border:none;border-top:1px solid rgba(148,163,184,.18)">'
        +'<h1 style="font-size:1.2rem">Registered users</h1>'
        +'<p class="sub">Everyone who created an account. Email them a password-reset link or resend their license key.</p>'
        +'<div id="uMsg"></div>'
        +'<div id="usersList" class="hint">Loading…</div>';
      bmRenderTiers(); bmLoadRelease(); bmLoadStripe(); bmLoadPromos(); bmLoadUsers();
    });
  }
  window.bmLoadStripe=function(){
    fetch('/api/admin/stripe').then(function(r){return r.json();}).then(function(d){ var c=d.config||{};
      var s=document.getElementById('stripeState'); if(s) s.innerHTML = d.configured ? '✅ Stripe is connected.' : '⚠️ Not connected yet — enter your keys below.';
      var pe=document.getElementById('stPrice'); if(pe) pe.value=c.priceId||'';
      var ks=document.getElementById('stSecret'); if(ks) ks.placeholder=c.hasSecret?'•••••• (unchanged)':'sk_live_… or sk_test_…';
      var kw=document.getElementById('stWebhook'); if(kw) kw.placeholder=c.hasWebhook?'•••••• (unchanged)':'whsec_…';
      var hook=document.getElementById('stHook'); if(hook) hook.textContent=location.origin+'/api/stripe/webhook';
    }).catch(function(){});
  };
  window.bmSaveStripe=function(){ var m=document.getElementById('stMsg');
    var body={ secretKey:document.getElementById('stSecret').value.trim(), priceId:document.getElementById('stPrice').value.trim(), webhookSecret:document.getElementById('stWebhook').value.trim() };
    api('/api/admin/stripe','POST',body).then(function(r){ if(r.j.ok){ m.className='msg ok'; m.textContent='Stripe settings saved.'; document.getElementById('stSecret').value=''; document.getElementById('stWebhook').value=''; bmLoadStripe(); } else { m.className='msg err'; m.textContent=r.j.error||'Save failed.'; } });
  };
  window.bmLoadUsers=function(){ fetch('/api/admin/users').then(function(r){return r.json();}).then(function(d){ var el=document.getElementById('usersList'); if(!el)return; var s=d.users||[];
    if(!s.length){ el.textContent='No registered users yet.'; return; }
    var h='<table style="width:100%;font-size:.8rem;border-collapse:collapse"><tr style="text-align:left;color:#9fb0c7;border-bottom:1px solid rgba(148,163,184,.2)"><th style="padding:.35rem .3rem">Email</th><th>Status</th><th>License key</th><th>Renews</th><th>Actions</th></tr>';
    s.slice().reverse().forEach(function(x){
      var st = x.status||(x.hasPassword?'registered':'');
      var lic = x.licenseKey?('<code>'+esc(x.licenseKey)+'</code>'):'<span style="color:#7e8ca3">—</span>';
      var e = esc(x.email); var ea = e.replace(/\x27/g,"\\x27");
      var bstyle='class="ghost" style="margin:0 .25rem .25rem 0;padding:.3rem .55rem;font-size:.75rem"';
      h+='<tr style="border-bottom:1px solid rgba(148,163,184,.1)"><td style="padding:.4rem .3rem">'+e+(x.hasPassword?'':' <span style="color:#7e8ca3">(no login)</span>')+(x.comp?' <span style="color:#7fd6e6">(gift)</span>':'')+'</td>'
        +'<td>'+esc(st)+'</td><td>'+lic+'</td><td>'+(x.currentPeriodEnd?new Date(x.currentPeriodEnd).toLocaleDateString():'')+'</td>'
        +'<td style="white-space:nowrap"><button '+bstyle+' onclick="bmResetPw(\''+ea+'\')">Reset password</button>'
        +'<button '+bstyle+' onclick="bmResendLic(\''+ea+'\')" '+(x.licenseKey?'':'disabled')+'>Resend license</button>'
        +'<button '+bstyle+' onclick="bmGift(\''+ea+'\')">Gift</button>'
        +(x.subscriptionId?('<button '+bstyle+' onclick="bmCancelSub(\''+ea+'\')">Cancel sub</button>'):'')
        +'<button class="ghost" style="margin:0 .25rem .25rem 0;padding:.3rem .55rem;font-size:.75rem;color:#fca5a5" onclick="bmDeleteUser(\''+ea+'\')">Delete</button></td></tr>';
    });
    el.innerHTML=h+'</table>';
  }).catch(function(){}); };
  function uMsg(cls,t){ var m=document.getElementById('uMsg'); if(m){ m.className='msg '+cls; m.textContent=t; } }
  window.bmResetPw=function(email){ if(!confirm('Email a password-reset link to '+email+'?'))return; api('/api/admin/users/reset-password','POST',{email:email}).then(function(r){ if(r.j.ok) uMsg('ok','Password-reset link emailed to '+email+'.'); else uMsg('err',r.j.error||'Failed to send.'); }); };
  window.bmResendLic=function(email){ if(!confirm('Resend the license key email to '+email+'?'))return; api('/api/admin/users/resend-license','POST',{email:email}).then(function(r){ if(r.j.ok) uMsg('ok','License key emailed to '+email+'.'); else uMsg('err',r.j.error||'Failed to send.'); }); };
  window.bmGift=function(email){ var mo=prompt('Gift a free license to '+email+' for how many months?\\n(Use a large number like 1200 for lifetime.)','12'); if(mo===null)return; mo=parseInt(mo,10); if(!(mo>0)){ uMsg('err','Enter a number of months.'); return; } api('/api/admin/users/gift','POST',{email:email,months:mo}).then(function(r){ if(r.j.ok){ uMsg('ok','Gifted '+mo+' month(s) to '+email+' — key '+r.j.licenseKey+' emailed.'); bmLoadUsers(); } else uMsg('err',r.j.error||'Failed.'); }); };
  window.bmCancelSub=function(email){ if(!confirm('Cancel '+email+"'s subscription at the end of the current period?"))return; api('/api/admin/users/cancel','POST',{email:email,atPeriodEnd:true}).then(function(r){ if(r.j.ok){ uMsg('ok','Subscription set to cancel at period end for '+email+'.'); bmLoadUsers(); } else uMsg('err',r.j.error||'Failed.'); }); };
  window.bmDeleteUser=function(email){ if(!confirm('Permanently delete '+email+'?\n\nThis removes their account & license record. It does NOT cancel any Stripe subscription — cancel that first if needed.'))return; api('/api/admin/users/delete','POST',{email:email}).then(function(r){ if(r.j.ok){ uMsg('ok','Deleted '+email+'.'); bmLoadUsers(); } else uMsg('err',r.j.error||'Failed.'); }); };

  window.bmLoadPromos=function(){ fetch('/api/admin/promos').then(function(r){return r.json();}).then(function(d){ var el=document.getElementById('promoList'); if(!el)return;
    if(!d.ok){ el.textContent=d.error||'Connect Stripe to manage promo codes.'; return; }
    var s=d.promos||[]; if(!s.length){ el.textContent='No promo codes yet.'; return; }
    var h='<table style="width:100%;font-size:.8rem;border-collapse:collapse"><tr style="text-align:left;color:#9fb0c7;border-bottom:1px solid rgba(148,163,184,.2)"><th style="padding:.35rem .3rem">Code</th><th>Discount</th><th>Applies</th><th>Used</th><th></th></tr>';
    s.forEach(function(x){ var disc=x.percentOff?(x.percentOff+'% off'):(x.amountOff?('$'+(x.amountOff/100)+' off'):'—');
      var dur=x.duration==='repeating'?('first '+x.durationInMonths+' mo'):(x.duration==='forever'?'forever':'once');
      var used=x.timesRedeemed+(x.maxRedemptions?('/'+x.maxRedemptions):'');
      h+='<tr style="border-bottom:1px solid rgba(148,163,184,.1)'+(x.active?'':';opacity:.5')+'"><td style="padding:.4rem .3rem"><code>'+esc(x.code)+'</code></td><td>'+esc(disc)+'</td><td>'+esc(dur)+'</td><td>'+esc(used)+'</td>'
        +'<td><button class="ghost" style="margin:0;padding:.3rem .55rem;font-size:.75rem" onclick="bmTogglePromo(\''+esc(x.id)+'\','+(x.active?'false':'true')+')">'+(x.active?'Disable':'Enable')+'</button></td></tr>'; });
    el.innerHTML=h+'</table>';
  }).catch(function(){}); };
  window.bmTogglePromo=function(id,active){ api('/api/admin/promos/toggle','POST',{id:id,active:active==='true'||active===true}).then(function(){ bmLoadPromos(); }); };
  window.bmCreatePromo=function(){ var m=document.getElementById('pmMsg');
    var body={ code:document.getElementById('pmCode').value.trim(), kind:document.getElementById('pmKind').value, value:document.getElementById('pmValue').value, duration:document.getElementById('pmDur').value, months:document.getElementById('pmMonths').value, maxRedemptions:document.getElementById('pmMax').value };
    if(!body.code){ m.className='msg err'; m.textContent='Enter a code.'; return; }
    api('/api/admin/promos','POST',body).then(function(r){ if(r.j.ok){ m.className='msg ok'; m.textContent='Created promo code '+r.j.code+'.'; document.getElementById('pmCode').value=''; document.getElementById('pmValue').value=''; bmLoadPromos(); } else { m.className='msg err'; m.textContent=r.j.error||'Failed.'; } }); };
  window.bmLoadRelease=function(){ fetch('/api/admin/release').then(function(r){return r.json();}).then(function(d){ var el=document.getElementById('relCurrent'); if(!el)return; var r=d.release; el.innerHTML = (r&&r.version) ? ('Current published version: <strong>v'+esc(r.version)+'</strong>'+(r.publishedAt?(' &middot; '+new Date(r.publishedAt).toLocaleString()):'')) : 'No release published yet.'; }).catch(function(){}); };
  window.bmPublish=function(){ var m=document.getElementById('relMsg'); var f=document.getElementById('relFile').files[0]; var v=document.getElementById('relVer').value.trim(); var n=document.getElementById('relNotes').value.trim();
    if(!f){ m.className='msg err'; m.textContent='Choose the installer .exe.'; return; }
    if(!v){ m.className='msg err'; m.textContent='Enter a version (e.g. 1.1.4).'; return; }
    m.className='msg'; m.textContent='Uploading '+(f.size/1048576).toFixed(1)+' MB…';
    fetch('/api/admin/release',{method:'PUT',headers:{'x-version':v,'x-notes':encodeURIComponent(n)},body:f}).then(function(r){return r.json();}).then(function(d){ if(d.ok){ m.className='msg ok'; m.textContent='Published v'+d.release.version+'. Installs will see it on their next check.'; document.getElementById('relFile').value=''; bmLoadRelease(); } else { m.className='msg err'; m.textContent=d.error||'Publish failed.'; } }).catch(function(){ m.className='msg err'; m.textContent='Upload failed.'; }); };
  var SEL='style="width:100%;padding:.6rem;border-radius:10px;background:rgba(2,6,23,.55);color:#e6eefb;border:1px solid rgba(148,163,184,.25)"';
  window.bmRenderTiers=function(){ var w=document.getElementById('plansWrap'); if(!w)return; var h='';
    if(!CFG.tiers.length) h='<p class="hint">No plans yet — add one below.</p>';
    CFG.tiers.forEach(function(t,i){
      h+='<div style="border:1px solid rgba(148,163,184,.25);border-radius:12px;padding:1rem;margin:.8rem 0;background:rgba(2,6,23,.25)">'
        +'<div class="row"><div style="flex:2"><label>Plan name</label><input data-t="'+i+'" data-f="name" value="'+esc(t.name)+'"></div>'
        +'<div><label>Price</label><input type="number" step="0.01" data-t="'+i+'" data-f="price" value="'+esc(t.price)+'"></div>'
        +'<div><label>Per</label><select data-t="'+i+'" data-f="period" '+SEL+'><option value="month"'+(t.period!=='year'?' selected':'')+'>month</option><option value="year"'+(t.period==='year'?' selected':'')+'>year</option></select></div></div>'
        +'<label>Features <span class="hint">(one per line)</span></label><textarea rows="4" data-t="'+i+'" data-f="features">'+esc((t.features||[]).join('\n'))+'</textarea>'
        +'<div style="display:flex;gap:1.2rem;align-items:center;margin-top:.6rem;flex-wrap:wrap">'
        +'<label style="margin:0;font-weight:400"><input type="checkbox" data-t="'+i+'" data-f="enabled" '+(t.enabled!==false?'checked':'')+'> Enabled</label>'
        +'<label style="margin:0;font-weight:400"><input type="checkbox" data-t="'+i+'" data-f="popular" '+(t.popular?'checked':'')+'> Most popular</label>'
        +'<span class="hint">'+(t.hasStripePrice?'✅ Stripe price ready':'⚠️ price created when you save')+'</span>'
        +'<button class="ghost" style="margin:0 0 0 auto;padding:.3rem .6rem;font-size:.8rem" onclick="bmRemoveTier('+i+')">Remove</button></div></div>';
    });
    w.innerHTML=h;
  };
  function bmCollectTiers(){
    document.querySelectorAll('#plansWrap [data-t]').forEach(function(el){ var i=+el.getAttribute('data-t'), f=el.getAttribute('data-f'); var t=CFG.tiers[i]; if(!t)return;
      if(f==='enabled'||f==='popular') t[f]=el.checked;
      else if(f==='features') t[f]=el.value.split(/\r?\n/).map(function(s){return s.trim();}).filter(Boolean);
      else if(f==='price') t[f]=parseFloat(el.value)||0;
      else t[f]=el.value; });
    CFG.currency=document.getElementById('tCur').value; CFG.cta=document.getElementById('tCta').value; CFG.fineprint=document.getElementById('tFine').value;
  }
  window.bmAddTier=function(){ bmCollectTiers(); CFG.tiers.push({name:'New plan',price:0,period:'month',features:[],enabled:true,popular:false}); bmRenderTiers(); };
  window.bmRemoveTier=function(i){ bmCollectTiers(); if(confirm('Remove this plan? (Existing subscribers are not affected.)')){ CFG.tiers.splice(i,1); bmRenderTiers(); } };
  window.bmSaveTiers=function(){ bmCollectTiers(); var m=document.getElementById('tMsg'); m.className='msg'; m.textContent='Saving (syncing Stripe prices)…';
    api('/api/admin/tiers','POST',{currency:CFG.currency,cta:CFG.cta,fineprint:CFG.fineprint,tiers:CFG.tiers}).then(function(r){
      if(r.j.ok){ CFG=r.j.config||CFG; if(!Array.isArray(CFG.tiers))CFG.tiers=[]; m.className='msg '+(r.j.warning?'err':'ok'); m.textContent=r.j.warning||'Plans saved — the website is updated.'; bmRenderTiers(); }
      else { m.className='msg err'; m.textContent=r.j.error||'Save failed.'; } });
  };
  window.doLogout=function(){ api('/api/admin/logout','POST').then(function(){ renderLogin(); }); };

  load();
</script>
</body>
</html>
